<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold">RAG System Architecture</text>

  <!-- User Query -->
  <rect x="350" y="60" width="100" height="40" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="5"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">User Query</text>

  <!-- FastAPI Endpoint -->
  <rect x="350" y="130" width="100" height="40" fill="#f3e5f5" stroke="#4a148c" stroke-width="2" rx="5"/>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">FastAPI</text>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Endpoint</text>

  <!-- Query Classification -->
  <rect x="350" y="200" width="100" height="40" fill="#f3e5f5" stroke="#4a148c" stroke-width="2" rx="5"/>
  <text x="400" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Query</text>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Classification</text>

  <!-- Decision Point -->
  <rect x="350" y="270" width="100" height="40" fill="#fff" stroke="#666" stroke-width="2" rx="20"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Query Type?</text>

  <!-- Q&A Agent -->
  <rect x="150" y="340" width="100" height="40" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="5"/>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Q&A Agent</text>

  <!-- Analytics Agent -->
  <rect x="550" y="340" width="100" height="40" fill="#e1f5fe" stroke="#01579b" stroke-width="2" rx="5"/>
  <text x="600" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Analytics Agent</text>

  <!-- Q&A Flow -->
  <rect x="50" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="90" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Retrieve</text>

  <rect x="150" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="190" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Build Context</text>

  <rect x="250" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="290" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Generate Answer</text>

  <!-- Analytics Flow -->
  <rect x="450" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="490" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Generate SQL</text>

  <rect x="550" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="590" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Validate SQL</text>

  <rect x="650" y="410" width="80" height="30" fill="#f3e5f5" stroke="#4a148c" stroke-width="1" rx="3"/>
  <text x="690" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Execute SQL</text>

  <!-- Evaluation -->
  <rect x="350" y="480" width="100" height="40" fill="#e8f5e8" stroke="#1b5e20" stroke-width="2" rx="5"/>
  <text x="400" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Evaluation &</text>
  <text x="400" y="518" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Metrics</text>

  <!-- Response -->
  <rect x="350" y="550" width="100" height="40" fill="#e8f5e8" stroke="#1b5e20" stroke-width="2" rx="5"/>
  <text x="400" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Response</text>

  <!-- Arrows -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="170" x2="400" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="240" x2="400" y2="270" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision arrows -->
  <line x1="350" y1="290" x2="250" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="280" y="330" font-family="Arial, sans-serif" font-size="10">General Q&A</text>

  <line x1="450" y1="290" x2="550" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="480" y="330" font-family="Arial, sans-serif" font-size="10">Analytics/Data</text>

  <!-- Q&A flow arrows -->
  <line x1="200" y1="380" x2="130" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="440" x2="210" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="440" x2="290" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="425" x2="350" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Analytics flow arrows -->
  <line x1="600" y1="380" x2="530" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="440" x2="610" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="440" x2="690" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="730" y1="425" x2="450" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Final arrows -->
  <line x1="400" y1="520" x2="400" y2="550" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>